<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Eventサンプル</title>
    <script>
    window.onload = function(){
      var button = document.getElementById("button");
      button.onclick = function()
      {
          var input1 = document.getElementById('number1').value - 0;
          var input2 = document.getElementById('number2').value - 0;
          var sum = input1 + input2;
          window.alert('答えは、' + sum +' です');
      };
    };
    </script>
  </head>
  <body>
    <input type='text' id='number1'>
    <input type='text' id='number2'>
    <input type="button" id="button" value="合計を計算">
  </body>
</html>
